general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot # Берет скриншот текущего экрана
    blur_passes = 2 # 0 - отключает блюр
    contrast = 0.8916
    brightness = 0.8172
    vignette = 0.1
    vignette_intensity = 0.5
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(40, 40, 40, 1.0)
    inner_color = rgba(60, 56, 54, 1.0)
    font_color = rgb(235, 219, 178)
    fade_on_empty = false
    placeholder_text = <span foreground="##ebdbb2">Введите пароль...</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(235, 219, 178)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
