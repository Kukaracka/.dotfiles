# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing
exec-once = syncthing --no-browser
exec-once = wl-gammarelay
exec-once = tuilctl toggle light

# exec-once = hyprctl dispatch exec [workspace 1 silent] kitty
# exec-once = hyprctl dispatch exec [workspace 2 silent] zen-browser
# exec-once = hyprctl dispatch exec [workspace 3 silent] Telegram
exec = hyprctl dispatch exec [workspace 1] keepassxc
# exec = hyprctl dispatch exec [workspace 4 silent] throne
exec-once = autossh -M 0 -f -N -o "ServerAliveInterval 30" -o "ServerAliveCountMax 3" -L 1338:127.0.0.1:56478 vps_tema
exec-once = autossh -M 0 -f -N -o "ServerAliveInterval 30" -o "ServerAliveCountMax 3" -L 1340:127.0.0.1:46734 vps_new_nl


exec-once = [workspace 1 silent] kitty
exec-once = [workspace 2 silent] zen-browser
exec-once = [workspace 3 silent] Telegram

exec-once = keepassxc
windowrule = match:class ^(org.keepassxc.KeePassXC)$, workspace 4 silent

exec-once = [workspace 4 silent] throne
