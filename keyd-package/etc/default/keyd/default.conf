[ids]
*

[main]
capslock = overload(control, esc)
rightalt = backspace
# leftcontrol = overload(alt,macro(leftmeta+c))
# leftalt = overload(meta, macro(leftmeta+leftalt+c))
# leftshift = oneshot(shift)

space = overload(layer_one, space)

a = overload(alt, a)
s = overload(meta, s)
d = overload(control, d)
f = overload(shift, f)

; = overload(alt, ;)
l = overload(meta, l)
k = overload(control, k)
j = overload(shift, j)


d+k = enter
f+j = macro(leftmeta+enter)


leftcontrol = macro(leftmeta+c)
leftalt = macro(leftmeta+leftalt+c)
# leftshift = enter
s+space=macro(leftmeta+space)
leftshift = z
z = x
x = c
c = v
v = b


e+r = (
d+f = [
x+c = {

u+i = ) 
j+k = ]
m+, = }

s+d = "
k+l = '

s+l = leftmeta

[layer_one]
q=-
w=7
e=8
r=9
t=+

a=p
s=4
d=5
f=6
g==

leftshift = /
z=1
x=2
c=3
v=_

leftalt = 0

y=macro(leftcontrol+o)
u=macro(leftcontrol+v)
i=macro(leftcontrol+x)
o=macro(leftcontrol+z)
p=macro(leftcontrol+b)


h=macro(leftshift+7)
j = left
k = down
l = up
; = right

n=insert
m=home
,=pageup
.=pagedown
/=end



[layer_two]
q = macro(leftmeta+1)
w = macro(leftmeta+2)
e = macro(leftmeta+3)
r = macro(leftmeta+4)
t = macro(leftmeta+5)
y = macro(leftmeta+6)
u = macro(leftmeta+7)
i = macro(leftmeta+8)
o = macro(leftmeta+9)
p = macro(leftmeta+0)
h = macro(leftmeta+m)
l = macro(leftmeta+u)
j = macro(leftmeta+y)
k = macro(leftmeta+n)

space = space
